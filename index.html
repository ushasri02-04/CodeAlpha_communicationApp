<!DOCTYPE html>
<html>
<head>
  <title>ConnectMeet</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>

<h1>ConnectMeet 🎥</h1>

<div>
<a href="index.html">Home</a>
<a href="whiteboard.html">Whiteboard</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
</div>

</nav>

<center>

<h2 id="timer">00:00</h2>

<h3>Total Participants: 2 👥</h3>

<h3 id="dateTime"></h3>

</center>

<div class="video-section">

<div class="video-card">

<h2>User 1</h2>

<div class="video-box"></div>

</div>

<div class="video-card">

<h2>User 2</h2>

<div class="video-box"></div>

</div>

</div>

<div class="controls">

<button onclick="startCall()">Start Video Call 📞</button>

<button onclick="shareScreen()">Share Screen 🖥️</button>

<button onclick="toggleMode()">Dark Mode 🌙</button>

<button onclick="muteAudio()">Mute 🎤</button>

<button onclick="toggleCamera()">Camera OFF 📷</button>

<button onclick="downloadChat()">Download Chat ⬇️</button>

<button onclick="raiseHand()">Raise Hand ✋</button>

<button onclick="copyMeetingLink()">Copy Link 🔗</button>

<button onclick="fullScreen()">Full Screen ⛶</button>

<button onclick="recordMeeting()">Start Recording ⏺️</button>

<button onclick="clearChat()">Clear Chat 🗑️</button>

<button onclick="endMeeting()">End Meeting ❌</button>

<input type="file" onchange="fileUploaded()">

</div>

<div class="chat-box">

<h2>Team Chat 💬</h2>

<p id="typing"></p>

<input type="text" id="message" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

<button onclick="addEmoji('😀')">😀</button>

<button onclick="addEmoji('🔥')">🔥</button>

<button onclick="addEmoji('❤️')">❤️</button>

<div id="messages"></div>

</div>

<script src="script.js"></script>

</body>
</html>
