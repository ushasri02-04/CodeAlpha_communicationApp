<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.box{
background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#1f1f1f;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="text" placeholder="Enter Name">

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Register</button>

</div>

</body>
</html>
